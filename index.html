<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bermuda MAFIA - Firefox MediaPipe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; background: #000; overflow: hidden;
      font-family: 'Courier New', monospace; touch-action: none;
    }
    #video {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1); opacity: 0.25; z-index: 1;
    }
    #canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; }
.hud {
      position: fixed; top: 20px; left: 20px; right: 20px; z-index: 10;
      color: #ff3d00; font-size: 12px; line-height: 2; letter-spacing: 2px;
      text-shadow: 0 0 25px #ff3d00; pointer-events: none;
      font-weight: 900; text-align: center;
    }
.signature {
      position: fixed; bottom: 20px; right: 20px; z-index: 10;
      color: #ff3d00; font-size: 10px; letter-spacing: 3px;
      text-shadow: 0 0 20px #ff3d00; pointer-events: none; font-weight: bold;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
  <div class="hud" id="hud">LOADING FIREFOX VERSION...</div>
  <div class="signature">SIR MAGOMEIZHOIR</div>

  <script type="module">
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let audioCtx, eyes = [], shields = [], sparks = [];

    function playShieldSound() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    class LineEyeOfAgamotto {
      constructor(x, y, hand) {
        this.x = x; this.y = y; this.hand = hand;
        this.radius = 0; this.maxRadius = 90;
        this.rotation = 0; this.innerRotation = 0;
        this.state = 'summon'; this.expansionSpeed = 3.5;
        this.opened = false; this.autoUnleashTriggered = false;
        this.color = '#ff3d00'; this.shake = 0; this.itchyTimer = 0;
      }
      update(x, y) {
        this.x = x; this.y = y;
        if (this.state === 'summon' &&!this.autoUnleashTriggered) {
          if (this.radius < this.maxRadius) {
            this.radius += this.expansionSpeed;
          } else {
            this.state = 'unleash'; this.opened = true;
            this.autoUnleashTriggered = true;
            this.color = '#ff0000'; // GROSS BIG ITCHY RED
            this.itchyTimer = 60;
            playShieldSound();
            navigator.vibrate && navigator.vibrate([100, 50, 100, 50, 100]);
            hud.textContent = 'OVERLOAD - RED STATE';
          }
        }
        if (this.itchyTimer > 0) {
          this.itchyTimer--;
          this.shake = (Math.random() - 0.5) * 8;
        } else {
          this.shake = 0;
        }
        this.rotation += 0.02; this.innerRotation -= 0.04;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x + this.shake, this.y + this.shake);
        const r = this.opened? this.radius * 1.3 : this.radius;
        const lineColor = this.color;

        ctx.save(); ctx.rotate(this.rotation);
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = this.opened? 5 : 3;
        ctx.stroke();

        for (let i = 0; i < 12; i++) {
          const angle = (Math.PI * 2 / 12) * i;
          const x1 = Math.cos(angle) * r * 0.94, y1 = Math.sin(angle) * r * 0.94;
          const x2 = Math.cos(angle) * r * 1.06, y2 = Math.sin(angle) * r * 1.06;
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
          ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
        }
        ctx.restore();

        ctx.save(); ctx.rotate(this.innerRotation);
        ctx.beginPath(); ctx.arc(0, 0, r * 0.75, 0, Math.PI * 2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.stroke();
        for (let i = 0; i < 8; i++) {
          const angle = (Math.PI * 2 / 8) * i;
          ctx.save(); ctx.rotate(angle);
          ctx.beginPath(); ctx.moveTo(r * 0.5, 0); ctx.lineTo(r * 0.7, 0);
          ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
          ctx.restore();
        }
        ctx.restore();

        const lidOpen = this.opened? 0 : r * 0.4;
        ctx.beginPath(); ctx.ellipse(0, -lidOpen, r * 0.6, r * 0.35, 0, 0, Math.PI);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.beginPath(); ctx.ellipse(0, lidOpen, r * 0.6, r * 0.35, 0, Math.PI, Math.PI * 2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();

        ctx.beginPath(); ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();
      }
    }

    class LineStrangeShield {
      constructor(x, y, hand, radius) {
        this.x = x; this.y = y;
        this.radius = radius; this.targetRadius = radius;
        this.rotation = 0; this.hand = hand;
        this.color = '#ff3d00'; this.shake = 0;
      }
      update(x, y, radius) {
        this.x = x; this.y = y; this.targetRadius = radius;
        if (this.radius < this.targetRadius) this.radius += 15;
        if (this.radius > this.targetRadius) this.radius -= 15;
        this.rotation += 0.04;
        this.color = '#ff0000'; // RED
        this.shake = (Math.random() - 0.5) * 6;
      }
      draw() {
        ctx.save(); ctx.translate(this.x + this.shake, this.y + this.shake);
        const r = this.radius * 1.3; // GROSS BIG
        const lineColor = this.color;

        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 5; ctx.stroke();

        ctx.beginPath(); ctx.arc(0, 0, r * 0.9, 0, Math.PI * 2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.stroke();

        ctx.save(); ctx.rotate(this.rotation);
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI * 2 / 6) * i;
          const x1 = Math.cos(angle) * r * 0.7, y1 = Math.sin(angle) * r * 0.7;
          const x2 = Math.cos(angle + Math.PI * 2 / 3) * r * 0.7, y2 = Math.sin(angle + Math.PI * 2 / 3) * r * 0.7;
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
          ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(x1, y1);
          ctx.strokeStyle = lineColor; ctx.lineWidth = 1; ctx.stroke();
        }
        ctx.restore();

        ctx.beginPath(); ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
        ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();
      }
    }

    class Spark {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 18; this.vy = (Math.random() - 0.5) * 18;
        this.life = 1; this.size = Math.random() * 8 + 3; this.color = color;
      }
      update() {
        this.x += this.vx; this.y += this.vy; this.life -= 0.035;
        this.vx *= 0.94; this.vy *= 0.94;
      }
      draw() {
        ctx.globalAlpha = this.life;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    const hands = new Hands({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const activeEyes = new Set();
      const activeShields = new Set();

      if (results.multiHandLandmarks && results.multiHandedness) {
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
          const landmarks = results.multiHandLandmarks[i];
          const handedness = results.multiHandedness[i].label;
          const palmX = (1 - landmarks[9].x) * canvas.width;
          const palmY = landmarks[9].y * canvas.height;

          activeEyes.add(handedness);
          let eye = eyes.find(e => e.hand === handedness);
          if (!eye) {
            eye = new LineEyeOfAgamotto(palmX, palmY, handedness);
            eyes.push(eye);
          } else {
            eye.update(palmX, palmY);
          }

          if (eye.opened) {
            activeShields.add(handedness);
            const handSize = Math.hypot(
              landmarks[5].x - landmarks[17].x,
              landmarks[5].y - landmarks[17].y
            ) * canvas.width;
            const shieldRadius = handSize * 2.8;

            let shield = shields.find(s => s.hand === handedness);
            if (!shield) {
              shield = new LineStrangeShield(palmX, palmY, handedness, shieldRadius);
              shields.push(shield);
            } else {
              shield.update(palmX, palmY, shieldRadius);
            }

            if (Math.random() > 0.8) {
              for (let j = 0; j < 2; j++) {
                sparks.push(new Spark(
                  palmX + (Math.random() - 0.5) * shieldRadius,
                  palmY + (Math.random() - 0.5) * shieldRadius,
                  '#ff0000'
                ));
              }
            }
          }
        }
      }

      eyes = eyes.filter(e => activeEyes.has(e.hand));
      shields = shields.filter(s => activeShields.has(s.hand));

      eyes.forEach(e => e.draw());
      shields.forEach(s => s.draw());

      for (let i = sparks.length - 1; i >= 0; i--) {
        sparks[i].update(); sparks[i].draw();
        if (sparks[i].life <= 0) sparks.splice(i, 1);
      }

      if (eyes.length === 0 && shields.length === 0) {
        hud.textContent = 'SHOW BOTH HANDS';
      }
    });

    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({image: video});
      },
      width: 240,
      height: 320
    });

    hud.textContent = 'STARTING CAMERA...';
    camera.start().then(() => {
      hud.textContent = 'SHOW BOTH HANDS';
    }).catch((err) => {
      hud.textContent = 'CAMERA ERROR: ' + err.message;
    });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
    document.body.addEventListener('click', () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }, { once: true });
  </script>
</body>
</html>
