<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERLOAD - RED STATE</title>
<style>
  body{margin:0;background:#000;overflow:hidden;font-family:monospace}
  video{width:100vw;height:100vh;object-fit:cover;transform:scaleX(-1);filter:brightness(0.4)}
  svg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
  .text{position:absolute;width:100%;text-align:center;font-size:10px;letter-spacing:2px}
  #top{top:20px} #bottom{bottom:20px}
</style>
<script type="importmap">
{"imports": {
  "@mediapipe/hands": "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js",
  "@mediapipe/camera_utils": "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
}}
</script>
</head>
<body>
<video id="cam" autoplay playsinline></video>
<div id="top" class="text">OVERLOAD - RED STATE</div>
<div id="bottom" class="text">SIR MAGOMEIZHOIR</div>

<svg id="rune" width="120" height="120" viewBox="0 0 300 300">
  <circle id="o1" cx="150" cy="150" r="140" stroke-width="2" fill="none"/>
  <circle id="o2" cx="150" cy="150" r="120" stroke-width="2" fill="none"/>
  <path id="star" d="M150 20 L280 215 L20 215 Z M150 280 L20 85 L280 85 Z" stroke-width="2" fill="none"/>
  <circle id="i1" cx="150" cy="150" r="70" stroke-width="2" fill="none"/>
  <circle id="i2" cx="150" cy="150" r="50" stroke-width="2" fill="none"/>
  <circle id="i3" cx="150" cy="150" r="30" stroke-width="2" fill="none"/>
  <path id="eye" d="M110 150 Q150 110 190 150 Q150 190 110 150" stroke-width="2" fill="none"/>
  <circle id="pupil" cx="150" cy="150" r="8" fill="none"/>
  <circle cx="200" cy="100" r="4" fill="none"/><circle cx="100" cy="200" r="4" fill="none"/>
  <text x="145" y="160" font-size="10" fill="none">01</text>
</svg>

<script type="module">
import {Hands} from '@mediapipe/hands';
import {Camera} from '@mediapipe/camera_utils';

const video = document.getElementById('cam');
const rune = document.getElementById('rune');
const parts = rune.querySelectorAll('circle, path, text');
const text = document.querySelectorAll('.text');

let forming = 0;
let angle = 0;

const idleSize = 120; // Green idle
const maxSize = 200;  // Red max

const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.5});

hands.onResults(r => {
  const handSeen = r.multiHandLandmarks.length > 0;
  
  forming += handSeen ? 0.03 : -0.06;
  forming = Math.max(0, Math.min(1, forming));

  const size = idleSize + (maxSize - idleSize) * forming;
  rune.style.width = size + 'px';
  rune.style.height = size + 'px';

  // OUTLINE ONLY: Green > Red stroke, NO fill ever
  const g = Math.floor(255 * (1 - forming));
  const red = Math.floor(255 * forming);
  const color = `rgb(${red},${g},0)`;
  
  parts.forEach(el => {
    el.style.stroke = color;
    el.style.fill = 'none'; // LOCKED
  });
  text.forEach(el => el.style.color = color);

  // GLOW ONLY, NO SOLID CENTER
  rune.style.filter = `drop-shadow(0 0 ${6 + 18 * forming}px ${color})`;
  rune.style.opacity = 0.8 + 0.2 * forming;

  angle += 1 + forming * 2;
  rune.style.transform = `translate(-50%,-50%) rotate(${angle}deg)`;
});

const camera = new Camera(video, {
  onFrame: async () => await hands.send({image: video}),
  width: 640, height: 480
});
camera.start();
</script>
</body>
</html>
