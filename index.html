<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Strange Portal</title>
<style>
  body{margin:0;background:#000;overflow:hidden}
  video{width:100vw;height:100vh;object-fit:cover;transform:scaleX(-1)}
  svg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
  @keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
</style>
<script type="importmap">
{"imports": {
  "@mediapipe/hands": "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js",
  "@mediapipe/camera_utils": "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
}}
</script>
</head>
<body>
<video id="cam" autoplay playsinline></video>

<!-- OUTER RING + INNER RUNES -->
<svg id="portal" width="0" height="0" viewBox="0 0 200 200">
  <!-- Outer circle -->
  <circle id="ring" cx="100" cy="100" r="80" stroke-width="3" fill="none"/>
  <!-- Inner geometry -->
  <path id="rune" d="M100 20 L180 100 L100 180 L20 100 Z" stroke-width="2" fill="none"/>
  <circle id="core" cx="100" cy="100" r="25" stroke-width="2" fill="none"/>
</svg>

<script type="module">
import {Hands} from '@mediapipe/hands';
import {Camera} from '@mediapipe/camera_utils';

const video = document.getElementById('cam');
const portal = document.getElementById('portal');
const ring = document.getElementById('ring');
const rune = document.getElementById('rune');
const core = document.getElementById('core');

let forming = 0; // 0 to 1
let angle = 0;   // Spin

const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.5});

hands.onResults(r => {
  const handSeen = r.multiHandLandmarks.length > 0;
  
  // 1. FORMING ANIMATION: 0 > 1
  forming += handSeen ? 0.03 : -0.06; // Slower form, faster close
  forming = Math.max(0, Math.min(1, forming));

  // 2. SIZE: 0px > 350px 
  const size = 350 * forming;
  portal.style.width = size + 'px';
  portal.style.height = size + 'px';

  // 3. COLOR: Green 0% > Red 100%
  const g = Math.floor(255 * (1 - forming));
  const red = Math.floor(255 * forming);
  const color = `rgb(${red},${g},0)`;
  
  [ring, rune, core].forEach(el => {
    el.style.stroke = color;
    el.style.fill = forming > 0.6 ? `rgba(255,0,0,${forming-0.6})` : 'none'; // Fill late
  });

  // 4. GLOW: 0 > 40px red
  portal.style.filter = `drop-shadow(0 0 ${40 * forming}px red)`;
  portal.style.opacity = forming;

  // 5. SPIN: Only when forming
  if(forming > 0.1){
    angle += forming * 3; // Faster spin at max
    portal.style.animation = 'none';
    portal.style.transform = `translate(-50%,-50%) rotate(${angle}deg)`;
  }
});

const camera = new Camera(video, {
  onFrame: async () => await hands.send({image: video}),
  width: 640, height: 480
});
camera.start();
</script>
</body>
</html>
