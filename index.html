<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body{margin:0;background:#000;overflow:hidden}
  video{width:100vw;height:100vh;object-fit:cover;transform:scaleX(-1)}
  svg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);transition:all .8s ease;pointer-events:none}
</style>
<script type="importmap">
{
  "imports": {
    "@mediapipe/hands": "https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js",
    "@mediapipe/camera_utils": "https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
  }
}
</script>
</head>
<body>
<video id="cam" autoplay playsinline></video>
<svg id="portal" width="180" height="180" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="80" />
  <path d="M100 20 L180 100 L100 180 L20 100 Z" />
  <circle cx="100" cy="100" r="25" />
</svg>

<script type="module">
import {Hands} from '@mediapipe/hands';
import {Camera} from '@mediapipe/camera_utils';

const video = document.getElementById('cam');
const portal = document.getElementById('portal');

const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.5});

hands.onResults(r => {
  const cast = r.multiHandLandmarks.length > 0; // Hand = true
  portal.style.width = cast ? '350px' : '180px'; // Auto expand
  portal.style.height = cast ? '350px' : '180px';
  portal.style.stroke = cast ? 'red' : 'green'; // Color change
  portal.style.fill = cast ? 'red' : 'none'; // Max red fill
  portal.style.filter = cast ? 'drop-shadow(0 0 35px red)' : 'drop-shadow(0 0 8px green)';
});

const camera = new Camera(video, {
  onFrame: async () => await hands.send({image: video}),
  width: 640, height: 480
});
camera.start();
</script>
</body>
</html>
